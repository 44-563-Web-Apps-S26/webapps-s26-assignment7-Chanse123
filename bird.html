<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanse Summers Bird Hunt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container text-center mt-4">

    <h1>Chanse Summers bird hunt</h1>

    <p>Click on the locations to find the birds, watch out for the forbidden statue</p>

    <p id="locations">Number of locations checked is zero.</p>

    <p id="score">Score is zero.</p>

    <p>Click for help.</p>

    <p id="help">Help report</p>

    <button onclick="help()">Click for help</button>




<div class="container mt-4">

        <div class="col"><img id="i0" src="bush.png" class="img-fluid" onclick="check(0)"></div>

        <div class="col"><img id="i16" src="bush.png" class="img-fluid" onclick="check(16)"></div>
        <div class="col"><img id="i17" src="bush.png" class="img-fluid" onclick="check(17)"></div>

        <div class="col"><img id="i34" src="bush.png" class="img-fluid" onclick="check(34)"></div>
    </div>

</div>

<script>

let ids = [
"i0","i1","i2","i3","i4","i5","i6",
"i7","i8","i9","i10","i11","i12","i13",
"i14","i15","i16","i17","i18","i19","i20",
"i21","i22","i23","i24","i25","i26","i27",
"i28","i29","i30","i31","i32","i33","i34"
];

let score = 0;
let locationsVisited = 0;
let lastLocation = 0;

let statueLocation = 19;
let toucanLocation = 14;

let lorikeetLocations = [3,25];
let buntingLocations = [2,5,11,20,21];

let gameOver = false;

function check(position) {
    if (gameOver) {
        return;
    }

    let id = ids[position];
    let image = document.getElementById(id);

    if (position === statueLocation) {
        image.src = "statue.png";
        image.onclick = null;
        score = score - 3;
        gameOver = true;
    }
    else if (position === toucanLocation) {
        image.src = "Toucan.png";
        image.onclick = null;
        score = score + 5;
    }
    else if (lorikeetLocations.includes(position)) {
        image.src = "lorikeet.png";
        image.onclick = null;
        score = score + 3;
    }
    else if (buntingLocations.includes(position)) {
        image.src = "bunting.png";
        image.onclick = null;
        score = score + 1;
    }

    locationsVisited = locationsVisited + 1;

    document.getElementById("locations").innerHTML = "Number of locations visited is " + locationsVisited + ".";

    document.getElementById("score").innerHTML = "Score is " + score + ".";

    lastLocation = position;
}

function help() {
    let result = "silence";

    let neighbors4 = [
        (lastLocation - 1 + 35) % 35,
        (lastLocation + 1) % 35,
        (lastLocation - 7 + 35) % 35,
        (lastLocation + 7) % 35
    ];

    if (buntingLocations.includes(neighbors4[0]) ||
        buntingLocations.includes(neighbors4[1]) ||
        buntingLocations.includes(neighbors4[2]) ||
        buntingLocations.includes(neighbors4[3])) {
        result = "cheep";
    }
    else {
        let row = Math.floor(lastLocation / 7);
        let col = lastLocation % 7;

        for (let r = row - 1; r <= row + 1; r++) {
            for (let c = col - 1; c <= col + 1; c++) {
                if (r >= 0 && r < 5 && c >= 0 && c < 7) {
                    let pos = r * 7 + c;
                    if (pos === toucanLocation) {
                        result = "caw";
                    }
                }
            }
        }

        if (result === "silence") {
            for (let r = row - 1; r <= row + 1; r++) {
                for (let c = col - 1; c <= col + 1; c++) {
                    if (r >= 0 && r < 5 && c >= 0 && c < 7) {
                        let pos = r * 7 + c;
                        if (pos === statueLocation) {
                            result = "thrrum";
                        }
                    }
                }
            }
        }
    }

    document.getElementById("help").innerHTML = result;
}

</script>
